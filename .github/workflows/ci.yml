name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Syntax check
        run: |
          node --check server.mjs
          node --check public/app.js
      - name: Tests
        run: node --test server.test.mjs
      - name: Doctor (publish checks)
        run: node server.mjs --workspace ./workspace/ci --init sample --doctor
