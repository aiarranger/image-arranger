name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Public data hygiene
        run: |
          set -euo pipefail
          if git ls-files | grep -E '^(docs/(04_impl|review)/|docs/OSS_READINESS_REVIEW\.md$|OSS_REVIEW\.md$)'; then
            echo "Internal planning/review docs must not be committed."
            exit 1
          fi
          if git ls-files | grep -E '(^|/)(\.DS_Store|agent-logs/|review-sets/)|\.tgz$'; then
            echo "Local artifacts must not be committed."
            exit 1
          fi
          if git grep -nI -E '(/Users/macstudio|workspace/[A-Za-z0-9._-]*aichan|workspace/archive|workspace/fishing-fitness|http://127\.0\.0\.1:4190)' -- . ':!.github/workflows/ci.yml'; then
            echo "Private local paths or internal review URLs found in tracked files."
            exit 1
          fi
          node - <<'NODE'
          const { execFileSync } = await import("node:child_process");
          const { readFileSync } = await import("node:fs");
          const deny = [
            "d" + "emo-agent",
            "workspace/" + "d" + "emo",
            "\u30c7\u30e2",
            "fake" + " processor",
            "fake queue" + " processor",
            "placeholder" + " generation",
            "A" + "oi",
            "a" + "oi",
            "\u3042\u304a\u3044",
            "\u30a2\u30aa\u30a4",
            "\u8475",
            "\u84bc\u4e95",
            "\u9752\u4e95",
          ];
          const files = execFileSync("git", ["ls-files"], { encoding: "utf8" })
            .trim()
            .split("\n")
            .filter(Boolean)
            .filter((file) => file !== ".github/workflows/ci.yml");
          const failures = [];
          for (const file of files) {
            const bytes = readFileSync(file);
            if (bytes.includes(0)) continue;
            const text = bytes.toString("utf8");
            const lower = text.toLowerCase();
            for (const term of deny) {
              if (lower.includes(term.toLowerCase())) failures.push(`${file}: ${term}`);
            }
          }
          if (failures.length) {
            console.error("Removed processing terms must not be committed.");
            console.error(failures.join("\n"));
            process.exit(1);
          }
          NODE
      - name: Syntax check
        run: npm run check
      - name: Tests
        run: npm test
      - name: Doctor (publish checks)
        run: node server.mjs --workspace ./workspace/ci --init sample --doctor
      - name: Boot smoke
        run: |
          set -euo pipefail
          smoke_workspace="$(mktemp -d "${RUNNER_TEMP:-/tmp}/image-arranger-ci-smoke.XXXXXX")"
          node server.mjs --workspace "$smoke_workspace" --init sample --port 4217 > /tmp/image-arranger-smoke.log 2>&1 &
          server_pid=$!
          cleanup() {
            kill "$server_pid" 2>/dev/null || true
            wait "$server_pid" 2>/dev/null || true
            rm -rf "$smoke_workspace"
          }
          trap cleanup EXIT
          for attempt in $(seq 1 40); do
            if curl -sf http://127.0.0.1:4217/ >/dev/null; then
              break
            fi
            if ! kill -0 "$server_pid" 2>/dev/null; then
              cat /tmp/image-arranger-smoke.log
              exit 1
            fi
            sleep 0.25
          done
          curl -sf http://127.0.0.1:4217/ >/dev/null
          SMOKE_WORKSPACE="$smoke_workspace" node - <<'NODE'
          const baseUrl = "http://127.0.0.1:4217";
          const { mkdir, writeFile } = await import("node:fs/promises");
          const { join } = await import("node:path");
          const workspaceRoot = process.env.SMOKE_WORKSPACE;
          let state = await fetch(`${baseUrl}/api/state`).then((response) => response.json());
          let character = state.characters[0];
          if (!character.images.length) {
            character.images.push({
              id: "ci-smoke-image",
              overview: "CI smoke image",
              prompt: "one CI smoke image, no text, no watermark",
              version: 1,
              checked: false,
              requestStatus: "idle",
              tags: ["ci-only"],
              assets: [],
              refs: {
                master: character.base?.master?.[0]?.id ?? "",
                accessory: [],
                expression: [],
                clothing: [],
                background: [],
              },
            });
            const saved = await fetch(`${baseUrl}/api/state`, {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(state),
            }).then((response) => response.json());
            if (!saved.ok) throw new Error(`state setup failed: ${JSON.stringify(saved)}`);
            state = saved.state;
            character = state.characters[0];
          }
          const entry = character.images[0];
          const beforeGenerated = (entry.assets ?? []).filter((asset) => !(asset.tags ?? []).includes("source-reference")).length;
          const queued = await fetch(`${baseUrl}/api/requests`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              characterId: character.id,
              mode: "image",
              targets: [{
                action: "generate",
                entryId: entry.id,
                overview: `${entry.overview} / CI smoke`,
                prompt: entry.prompt || "one CI smoke image, no text, no watermark",
                inputs: { startFrame: null, endFrame: null, refImages: [] },
                outputDir: null,
              }],
            }),
          }).then((response) => response.json());
          if (!queued.ok) throw new Error(`queue failed: ${JSON.stringify(queued)}`);

          const rawOutputDir = queued.request.targets[0].outputDir ?? "outputs/sample-character";
          const outputDir = rawOutputDir.replace(/\/$/, "");
          const diskOutputDir = join(workspaceRoot, outputDir);
          const resultFile = `${outputDir.replace(/\/$/, "")}/ci-smoke-result.png`;
          const png = Buffer.from(
            "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGOSHzRgQAAAABJRU5ErkJggg==",
            "base64",
          );
          await mkdir(diskOutputDir, { recursive: true });
          await writeFile(join(diskOutputDir, "ci-smoke-result.png"), png);

          const completed = await fetch(`${baseUrl}/api/requests/complete`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              requestId: queued.request.requestId,
              targetIndex: 0,
              results: [{
                file: resultFile,
                name: "ci-smoke-result",
                prompt: "CI smoke completion artifact",
                removeBackground: false,
              }],
            }),
          }).then((response) => response.json());
          if (!completed.ok || completed.completed !== 1) {
            throw new Error(`completion failed: ${JSON.stringify(completed)}`);
          }
          await writeFile("/tmp/image-arranger-smoke-target.json", JSON.stringify({
            entryId: entry.id,
            beforeGenerated,
            resultFile,
          }));
          NODE
          node - <<'NODE'
          const { readFile } = await import("node:fs/promises");
          const { entryId, beforeGenerated, resultFile } = JSON.parse(await readFile("/tmp/image-arranger-smoke-target.json", "utf8"));
          const state = await fetch("http://127.0.0.1:4217/api/state").then((response) => response.json());
          const entry = state.characters[0].images.find((item) => item.id === entryId);
          if (!entry) throw new Error(`missing smoke entry ${entryId}`);
          const generated = (entry.assets ?? []).filter((asset) => !(asset.tags ?? []).includes("source-reference"));
          if (generated.length <= beforeGenerated) throw new Error(`completion API did not register a candidate asset for ${entryId}`);
          if (!generated.some((asset) => asset.file?.endsWith("/ci-smoke-result.png") && asset.prompt === "CI smoke completion artifact")) {
            throw new Error(`completion API did not preserve smoke result metadata for ${resultFile}`);
          }
          const queue = await fetch("http://127.0.0.1:4217/api/requests").then((response) => response.json());
          if (queue.requests.some((row) => row.entryId === entryId && row.mode === "image")) {
            throw new Error(`smoke image request still pending for ${entryId}`);
          }
          NODE
