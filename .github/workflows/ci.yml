name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Syntax check
        run: npm run check
      - name: Tests
        run: npm test
      - name: Doctor (publish checks)
        run: node server.mjs --workspace ./workspace/ci --init sample --doctor
